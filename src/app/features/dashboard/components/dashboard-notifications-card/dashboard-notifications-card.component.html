<article class="dashboard-card dashboard-card--notifications">
  <header class="dashboard-card__header dashboard-card__header--link">
    <h2>Notificações e alertas</h2>
    <button type="button" aria-label="Ver todas as notificações">Ver tudo</button>
  </header>

  <div class="dashboard-card__notification-list">
    @for (
      notification of notifications();
      track notification.timestamp + '-' + notification.title
    ) {
      <article class="dashboard-card__notification-item">
        <div
          class="dashboard-card__notification-icon"
          [class]="
            'dashboard-card__notification-icon dashboard-card__notification-icon--' +
            notification.tone
          "
        >
          <mat-icon>{{ notification.icon }}</mat-icon>
        </div>

        <div class="dashboard-card__notification-body">
          <div class="dashboard-card__notification-heading">
            <strong>{{ notification.title }}</strong>
            <span>{{ notification.timestamp }}</span>
          </div>
          <p>{{ notification.description }}</p>
        </div>
      </article>
    }
  </div>
</article>
