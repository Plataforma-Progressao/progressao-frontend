<aside class="dashboard-sidenav" [class.dashboard-sidenav--open]="opened()">
  <div class="dashboard-sidenav__top">
    <button
      type="button"
      mat-icon-button
      class="dashboard-sidenav__close-button"
      (click)="onClose()"
      aria-label="Fechar menu lateral"
    >
      <mat-icon>close</mat-icon>
    </button>

    <div class="dashboard-sidenav__user">
      <div class="dashboard-sidenav__avatar">{{ user()?.avatarInitials ?? 'PD' }}</div>
      <div>
        <strong>{{ user()?.name ?? 'Docente' }}</strong>
        <span>{{ user()?.title ?? 'Perfil institucional' }}</span>
      </div>
    </div>
  </div>

  <nav class="dashboard-sidenav__nav" aria-label="Navegação principal">
    @for (item of navigationItems(); track item.route) {
      <app-dashboard-nav-item [item]="item" [exact]="item.route === '/dashboard'" (click)="onNavigate()" />
    }
  </nav>

  <button type="button" class="dashboard-sidenav__logout" (click)="onLogout()" aria-label="Sair do sistema">
    <mat-icon>logout</mat-icon>
    <span>Sair</span>
  </button>
</aside>
