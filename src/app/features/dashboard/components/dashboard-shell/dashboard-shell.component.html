<div class="dashboard-shell">
  <app-dashboard-sidenav
    class="dashboard-shell__sidenav"
    [class.dashboard-shell__sidenav--desktop-collapsed]="desktopSidenavCollapsed()"
    [opened]="mobileMenuOpened()"
    [collapsed]="desktopSidenavCollapsed()"
    [user]="currentUser()"
    [navigationItems]="navigationItems"
    (closeRequested)="closeMobileMenu()"
    (itemSelected)="closeMobileMenu()"
    (logoutRequested)="logout()"
  />

  <div
    class="dashboard-shell__content"
    [class.dashboard-shell__content--desktop-collapsed]="desktopSidenavCollapsed()"
  >
    <app-dashboard-header
      [user]="currentUser()"
      [mobileMenuOpened]="mobileMenuOpened()"
      (menuToggle)="toggleMobileMenu()"
      (addActivity)="openCreateActivity()"
    />

    <main class="dashboard-shell__main">
      <router-outlet />
    </main>
  </div>
</div>
