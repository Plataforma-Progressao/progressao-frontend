<div class="config-home">
  <h1 class="config-home__title">Configurações</h1>

  @if (isLoading()) {
    <p class="config-home__status" role="status">Carregando seus dados...</p>
  } @else if (loadError()) {
    <div class="config-home__status config-home__status--error" role="alert">
      Não foi possível carregar o perfil agora.
      <button type="button" class="config-home__retry" (click)="profileResource.reload()">
        Tentar novamente
      </button>
    </div>
  } @else if (profileResource.hasValue()) {
    <div class="config-home__card">
      <div class="config-home__layout">
        <aside class="config-home__aside" aria-label="Identificação do perfil">
          <div class="config-home__avatar" aria-hidden="true">
            {{ avatarInitials() }}
          </div>
        </aside>

        <div class="config-home__main">
          <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="config-home__form" novalidate>
            <app-input
              formControlName="name"
              label="Nome completo"
              placeholder="Seu nome como no cadastro"
              prefixIcon="person_outline"
              [control]="profileForm.controls.name"
              errorMessage="Informe seu nome (mínimo 2 caracteres)."
            />

            <div
              class="config-home__email-field"
              [matTooltip]="emailFieldTooltip"
              matTooltipPosition="above"
              tabindex="0"
            >
              <app-input
                formControlName="email"
                label="E-mail institucional"
                type="email"
                prefixIcon="alternate_email"
                [disabledInput]="true"
                [control]="profileForm.controls.email"
              />
            </div>

            <div class="config-home__password-block">
              <h2 class="config-home__section-title">Alterar senha</h2>
              <p class="config-home__section-hint">
                Preencha apenas se quiser definir uma nova senha.
              </p>

              <app-input
                formControlName="currentPassword"
                label="Senha atual"
                [type]="hideCurrentPassword() ? 'password' : 'text'"
                placeholder="••••••••"
                prefixIcon="lock_outline"
                [suffixIcon]="hideCurrentPassword() ? 'visibility' : 'visibility_off'"
                [suffixIconAriaLabel]="
                  hideCurrentPassword() ? 'Mostrar senha atual' : 'Ocultar senha atual'
                "
                [suffixAction]="true"
                (suffixClicked)="toggleCurrentPasswordVisibility()"
                [control]="profileForm.controls.currentPassword"
              />

              <div class="config-home__form-grid">
                <app-input
                  formControlName="newPassword"
                  label="Nova senha"
                  [type]="hideNewPassword() ? 'password' : 'text'"
                  placeholder="Mínimo 8 caracteres"
                  prefixIcon="lock_outline"
                  [suffixIcon]="hideNewPassword() ? 'visibility' : 'visibility_off'"
                  [suffixIconAriaLabel]="
                    hideNewPassword() ? 'Mostrar nova senha' : 'Ocultar nova senha'
                  "
                  [suffixAction]="true"
                  (suffixClicked)="toggleNewPasswordVisibility()"
                  [control]="profileForm.controls.newPassword"
                />

                <app-input
                  formControlName="confirmNewPassword"
                  label="Confirmar nova senha"
                  [type]="hideConfirmPassword() ? 'password' : 'text'"
                  placeholder="Repita a nova senha"
                  prefixIcon="lock_outline"
                  [suffixIcon]="hideConfirmPassword() ? 'visibility' : 'visibility_off'"
                  [suffixIconAriaLabel]="
                    hideConfirmPassword() ? 'Mostrar confirmação' : 'Ocultar confirmação'
                  "
                  [suffixAction]="true"
                  (suffixClicked)="toggleConfirmPasswordVisibility()"
                  [control]="profileForm.controls.confirmNewPassword"
                />
              </div>
            </div>

            <div class="config-home__field-row">
              <app-input
                class="config-home__field-grow"
                formControlName="lattesUrl"
                label="Currículo Lattes"
                placeholder="URL do seu Currículo Lattes"
                prefixIcon="link"
                hint="Cole o endereço completo ou o caminho após o domínio."
                [control]="profileForm.controls.lattesUrl"
              />
              <button
                mat-icon-button
                type="button"
                class="config-home__action-icon"
                matTooltip="Abrir o Currículo Lattes em uma nova aba"
                matTooltipPosition="above"
                aria-label="Abrir Currículo Lattes em nova aba"
                (click)="openLattesInNewTab()"
              >
                <mat-icon aria-hidden="true">open_in_new</mat-icon>
              </button>
            </div>

            <div class="config-home__field-row">
              <app-input
                class="config-home__field-grow"
                formControlName="orcid"
                label="ORCID iD"
                placeholder="0000-0000-0000-0000"
                prefixIcon="badge"
                hint="Identificador ORCID (números e hífens)."
                [control]="profileForm.controls.orcid"
              />
              <button
                mat-icon-button
                type="button"
                class="config-home__action-icon"
                matTooltip="Copiar o ORCID iD"
                matTooltipPosition="above"
                aria-label="Copiar ORCID"
                (click)="copyOrcid()"
              >
                <mat-icon aria-hidden="true">content_copy</mat-icon>
              </button>
              <button
                mat-icon-button
                type="button"
                class="config-home__action-icon"
                matTooltip="Abrir o perfil ORCID em uma nova aba"
                matTooltipPosition="above"
                aria-label="Abrir perfil ORCID em nova aba"
                (click)="openOrcidInNewTab()"
              >
                <mat-icon aria-hidden="true">open_in_new</mat-icon>
              </button>
            </div>

            <div class="config-home__actions">
              <app-button
                variant="tertiary"
                type="button"
                label="Cancelar"
                [disabled]="saving()"
                (clicked)="onCancel()"
              />
              <app-button
                variant="primary"
                type="submit"
                label="Salvar alterações"
                icon="check"
                [loading]="saving()"
                [disabled]="saving()"
              />
            </div>
          </form>
        </div>
      </div>
    </div>
  }
</div>
