<div class="page-layout">
  <app-auth-page-header [showSignupLink]="false" />

  <main class="content-wrapper">
    <mat-card appearance="outlined" class="recovery-card">
      <header class="card-header">
        <h1>Recuperar senha</h1>
        <p>
          Informe seu e-mail institucional para receber as orientações de redefinição de acesso.
        </p>
      </header>

      <form
        [formGroup]="forgotPasswordForm"
        (ngSubmit)="onSubmit()"
        class="recovery-form"
        novalidate
      >
        <app-input
          formControlName="email"
          label="E-mail institucional"
          type="email"
          placeholder="nome.sobrenome@universidade.br"
          prefixIcon="mail_outline"
          [control]="forgotPasswordForm.controls.email"
          errorMessage="Digite um e-mail institucional válido."
        />

        @if (feedback(); as status) {
          <p
            class="feedback"
            [class.feedback--error]="status.type === 'error'"
            [attr.role]="status.type === 'error' ? 'alert' : 'status'"
          >
            {{ status.message }}
          </p>
        }

        <div class="actions">
          <app-button
            variant="secondary"
            size="large"
            type="button"
            label="Voltar para login"
            prefixIcon="arrow_back"
            (clicked)="goToLogin()"
          />

          <app-button
            variant="primary"
            size="large"
            type="submit"
            label="Enviar instruções"
            icon="arrow_forward"
            [loading]="submitting()"
            [disabled]="submitting()"
          />
        </div>

        <p class="helper">Verifique também sua caixa de spam caso o e-mail não chegue na inbox.</p>
      </form>
    </mat-card>
  </main>

  <app-auth-page-footer />
</div>
