<mat-form-field [appearance]="appearance()" [floatLabel]="floatLabel()" class="app-input-field">
  @if (label()) {
    <mat-label>{{ label() }}</mat-label>
  }

  @if (prefixIcon()) {
    <mat-icon matPrefix aria-hidden="true">{{ prefixIcon() }}</mat-icon>
  }

  @if (usesNgxMask) {
    <input
      matInput
      [mask]="ngxMaskPattern()!"
      [dropSpecialCharacters]="false"
      [showMaskTyped]="true"
      [placeholder]="placeholder()"
      [value]="value"
      [disabled]="isDisabled"
      [attr.aria-label]="label() || placeholder()"
      [attr.aria-invalid]="hasError"
      (input)="onInput($event)"
      (blur)="onBlur($event)"
    />
  } @else {
    <input
      matInput
      [type]="type() === 'number' ? 'text' : type()"
      [attr.inputmode]="type() === 'number' ? 'numeric' : null"
      [attr.pattern]="type() === 'number' ? '[0-9]*' : null"
      [placeholder]="placeholder()"
      [value]="value"
      [disabled]="isDisabled"
      [attr.maxlength]="maxLength"
      [attr.aria-label]="label() || placeholder()"
      [attr.aria-invalid]="hasError"
      (input)="onInput($event)"
      (blur)="onBlur($event)"
    />
  }

  @if (suffixIcon()) {
    <button
      mat-icon-button
      matSuffix
      type="button"
      [attr.aria-label]="suffixIconAriaLabel()"
      (click)="onSuffixClick()"
    >
      <mat-icon aria-hidden="true">{{ suffixIcon() }}</mat-icon>
    </button>
  }

  @if (hasError && errorMessage()) {
    <mat-error>{{ errorMessage() }}</mat-error>
  }

  @if (hint() && !hasError) {
    <mat-hint>{{ hint() }}</mat-hint>
  }
</mat-form-field>
