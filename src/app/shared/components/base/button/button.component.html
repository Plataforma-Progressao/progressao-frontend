@if (variant() === 'primary' || variant() === 'danger') {
  <button
    mat-flat-button
    [type]="type()"
    [disabled]="disabled()"
    [class]="buttonClass"
    (click)="onClick()"
  >
    <span class="app-btn__label">{{ label() }}</span>
    @if (icon()) {
      <mat-icon aria-hidden="true">{{ icon() }}</mat-icon>
    }
  </button>
} @else if (variant() === 'secondary') {
  <button
    mat-stroked-button
    [type]="type()"
    [disabled]="disabled()"
    [class]="buttonClass"
    (click)="onClick()"
  >
    <span class="app-btn__label">{{ label() }}</span>
    @if (icon()) {
      <mat-icon aria-hidden="true">{{ icon() }}</mat-icon>
    }
  </button>
} @else {
  <button
    mat-button
    [type]="type()"
    [disabled]="disabled()"
    [class]="buttonClass"
    (click)="onClick()"
  >
    <span class="app-btn__label">{{ label() }}</span>
    @if (icon()) {
      <mat-icon aria-hidden="true">{{ icon() }}</mat-icon>
    }
  </button>
}
