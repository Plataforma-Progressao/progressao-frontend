@if (variant() === 'icon') {
  <button
    mat-icon-button
    [type]="type()"
    [disabled]="isDisabled"
    [class]="buttonClass"
    (click)="onClick()"
    [attr.aria-label]="label()"
    [attr.aria-current]="ariaCurrent()"
  >
    <mat-icon aria-hidden="true">{{ icon() }}</mat-icon>
  </button>
} @else if (variant() === 'primary' || variant() === 'danger') {
  <button
    mat-flat-button
    [type]="type()"
    [disabled]="isDisabled"
    [class]="buttonClass"
    (click)="onClick()"
    [attr.aria-label]="loading() ? label() : null"
    [attr.aria-current]="ariaCurrent()"
  >
    @if (loading()) {
      <mat-spinner diameter="16" [strokeWidth]="2"></mat-spinner>
    } @else {
      @if (prefixIcon()) {
        <mat-icon aria-hidden="true">{{ prefixIcon() }}</mat-icon>
      }
      <span class="app-btn__label">{{ label() }}</span>
      @if (icon()) {
        <mat-icon aria-hidden="true">{{ icon() }}</mat-icon>
      }
    }
  </button>
} @else if (variant() === 'secondary') {
  <button
    mat-stroked-button
    [type]="type()"
    [disabled]="isDisabled"
    [class]="buttonClass"
    (click)="onClick()"
    [attr.aria-label]="loading() ? label() : null"
    [attr.aria-current]="ariaCurrent()"
  >
    @if (loading()) {
      <mat-spinner diameter="16" [strokeWidth]="2"></mat-spinner>
    } @else {
      <span class="app-btn__label">{{ label() }}</span>
      @if (icon()) {
        <mat-icon aria-hidden="true">{{ icon() }}</mat-icon>
      }
    }
  </button>
} @else {
  <button
    mat-button
    [type]="type()"
    [disabled]="isDisabled"
    [class]="buttonClass"
    (click)="onClick()"
    [attr.aria-label]="loading() ? label() : null"
    [attr.aria-current]="ariaCurrent()"
  >
    @if (loading()) {
      <mat-spinner diameter="16" [strokeWidth]="2"></mat-spinner>
    } @else {
      <span class="app-btn__label">{{ label() }}</span>
      @if (icon()) {
        <mat-icon aria-hidden="true">{{ icon() }}</mat-icon>
      }
    }
  </button>
}
